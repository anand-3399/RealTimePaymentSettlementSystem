spring:
  application:
    name: payment-processor
  profiles:
    active: local
  jackson:
    serialization:
      write-dates-as-timestamps: false

  datasource:
    url: ${ORACLE_URL}
    username: ${ORACLE_USER}
    password: ${ORACLE_PASSWORD}
    driver-class-name: oracle.jdbc.OracleDriver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.OracleDialect

  kafka:
    bootstrap-servers: ${KAFKA_SERVERS}
    consumer:
      group-id: payment-processor-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "*"
        spring.json.type.mapping: "com.payment.order.event.OrderCreatedEvent:com.rtps.processor.dto.OrderCreatedEvent"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    properties:
      spring.json.add.type.headers: true

  flyway:
    enabled: true
    baseline-on-migrate: true

resilience4j:
  retry:
    instances:
      ajbank:
        maxAttempts: 3
        waitDuration: 2000
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
        retryExceptions:
          - org.springframework.web.client.HttpServerErrorException
          - org.springframework.web.client.ResourceAccessException
  circuitbreaker:
    instances:
      ajbank:
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 60000
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true

server:
  port: 8082

ajbank:
  api:
    url: ${AJBANK_API_URL}
    key: ${AJBANK_API_KEY}

rtps:
  ajbank:
    url: ${AJBANK_URL:http://localhost:8083}
    secret: ${PROCESSOR_TO_AJBANK_SECRET}
  inbound-secret: ${ORDER_TO_PROCESSOR_SECRET}
  encryption:
    key: ${ENCRYPTION_KEY}

logging:
  level:
    root: INFO
    com.rtps.processor: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%X{correlationId}] %-5level %logger{36} - %msg%n"
