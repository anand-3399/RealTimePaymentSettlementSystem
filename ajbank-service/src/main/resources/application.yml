spring:
  application:
    name: ajbank-service
  datasource:
    url: ${ORACLE_URL}
    username: ${ORACLE_USER}
    password: ${ORACLE_PASSWORD}
    driver-class-name: oracle.jdbc.OracleDriver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.OracleDialect
  flyway:
    enabled: true
    baseline-on-migrate: true

server:
  port: 8083

rtps:
  inbound-secret: ${PROCESSOR_TO_AJBANK_SECRET}
  ajbank:
    webhook:
      url: ${RTPS_AJBANK_WEBHOOK_URL}
      secret: ${RTPS_AJBANK_WEBHOOK_SECRET}

logging:
  level:
    root: INFO
    com.rtps.ajbank: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%X{correlationId}] %-5level %logger{36} - %msg%n"
