<div class="register-container">
    <oj-form-layout>
        <oj-input-text label-hint="Username" value="{{username}}"></oj-input-text>
        <oj-input-text label-hint="Email" value="{{email}}"></oj-input-text>
        <oj-input-text label-hint="Password" value="{{password}}" type="password"></oj-input-text>
        <oj-button id="registerButton" on-oj-action="[[onClickRegister]]">Register</oj-button>
    </oj-form-layout>
</div>
