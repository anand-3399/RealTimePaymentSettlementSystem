<div class="auth-container">
  <div class="auth-card glass-card">
    <div class="auth-header">
      <iconify-icon icon="lucide:user-plus" class="auth-icon"></iconify-icon>
      <h2>Join RTPS</h2>
      <p>Create your settlement account</p>
    </div>

    <form (ngSubmit)="register()" #registerForm="ngForm" class="auth-form">
      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <div class="input-wrapper">
          <iconify-icon icon="lucide:user" class="input-icon"></iconify-icon>
          <input 
            type="text" 
            id="username" 
            class="form-input" 
            name="username" 
            [(ngModel)]="user.username" 
            placeholder="Choose a username"
            required minlength="3">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <div class="input-wrapper">
          <iconify-icon icon="lucide:mail" class="input-icon"></iconify-icon>
          <input 
            type="email" 
            id="email" 
            class="form-input" 
            name="email" 
            [(ngModel)]="user.email" 
            placeholder="Enter your email"
            required>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="accountNumber">Account Number (10 digits)</label>
        <div class="input-wrapper">
          <iconify-icon icon="lucide:credit-card" class="input-icon"></iconify-icon>
          <input 
            type="text" 
            id="accountNumber" 
            class="form-input" 
            name="accountNumber" 
            [(ngModel)]="user.accountNumber" 
            placeholder="e.g. 1234567890"
            required pattern="^[0-9]{10}$">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <div class="input-wrapper">
          <iconify-icon icon="lucide:lock" class="input-icon"></iconify-icon>
          <input 
            type="password" 
            id="password" 
            class="form-input" 
            name="password" 
            [(ngModel)]="user.password" 
            placeholder="Create a password"
            required minlength="6">
        </div>
      </div>

      <div *ngIf="errorMessage" class="error-message">
        <iconify-icon icon="lucide:alert-circle"></iconify-icon>
        {{ errorMessage }}
      </div>

      <div *ngIf="successMessage" class="error-message" style="background: rgba(16,185,129,0.1); border-color: rgba(16,185,129,0.2); color: #6ee7b7;">
        <iconify-icon icon="lucide:check-circle"></iconify-icon>
        {{ successMessage }}
      </div>

      <button type="submit" class="btn-primary" [disabled]="!registerForm.form.valid || loading">
        <span *ngIf="!loading">Create Account</span>
        <span *ngIf="loading" class="spinner"></span>
      </button>
      
      <div class="auth-footer">
        Already have an account? <a routerLink="/login">Sign In</a>
      </div>
    </form>
  </div>
</div>
